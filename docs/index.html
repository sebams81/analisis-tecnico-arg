<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Análisis técnico de acciones argentinas</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header>
    <h1>Análisis técnico de acciones argentinas</h1>
    <nav class="tabs">
      <button class="tab active" data-tab="tab1">1) Análisis General</button>
      <button class="tab" data-tab="tab2">2) Análisis Individual</button>
      <button class="tab" data-tab="tab3">3) Información Fundamental</button>
    </nav>
  </header>

  <main>
    <section id="tab1" class="tab-content active">
      <div class="controls">
        <span class="snapshot-info">Datos al: <span id="snapshotDate">—</span></span>

        <div class="ticker-filter">
          <button id="tickerFilterToggle" class="filter-btn">
            Tickers: <span id="tickerCount">24/24</span> ▼
          </button>
          <div id="tickerFilterPanel" class="filter-panel" hidden>
            <div class="filter-actions">
              <button data-action="all">Todos</button>
              <button data-action="none">Ninguno</button>
            </div>
            <div id="tickerCheckboxes" class="checkbox-list"></div>
          </div>
        </div>

        <div class="date-filter">
          <label for="dateInput">Fecha:</label>
          <input type="date" id="dateInput">
        </div>
      </div>

      <div id="toast" class="toast" hidden></div>
      <div id="loadingTab1" class="loading">Cargando…</div>
      <div id="errorTab1" class="error" hidden></div>
      <div class="table-wrap">
        <table id="signalsTable" hidden>
          <thead>
            <tr>
              <th>#</th>
              <th>Ticker</th>
              <th>Mercado</th>
              <th>HMA 16</th>
              <th>EMA 12/26</th>
              <th>SMA 10/50/100</th>
              <th>VMA 20</th>
              <th>Vela del día</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <section id="tab2" class="tab-content">
      <h2>Análisis Individual</h2>
      <p class="placeholder">Contenido en desarrollo</p>
    </section>

    <section id="tab3" class="tab-content">
      <div id="loadingTab3" class="loading" hidden>Cargando…</div>
      <div id="errorTab3" class="error" hidden></div>
      <div class="table-wrap">
        <table id="fundamentalsTable" hidden>
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Tickers afectados</th>
              <th>Evento</th>
              <th>Impacto</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

  </main>

  <footer id="appFooter"></footer>

  <script src="./app.js" defer></script>
</body>
</html>
